<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Matrix Crypto Pro</title>
    <style>
        body {
            background-color: #020204;
            color: #00f0ff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Đúng quy tắc khoảng cách bắt buộc: Trên 30px, Biên 3px */
        .container {
            margin-top: 30px;
            margin-left: 3px;
            margin-right: 3px;
            padding-bottom: 50px;
        }

        h3 {
            color: #ff007f;
            text-shadow: 0 0 8px #ff007f, 0 0 15px #ff007f;
            font-size: 14px;
            margin: 12px 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
        .status-locked { background: rgba(255, 0, 127, 0.2); border: 1px solid #ff007f; color: #ff007f; }
        .status-unlocked { background: rgba(0, 255, 100, 0.2); border: 1px solid #00ff64; color: #00ff64; text-shadow: 0 0 5px #00ff64; }

        /* --- KHU VỰC LƯỚI --- */
        .grid-container {
            display: grid;
            margin-bottom: 12px;
            padding: 4px;
            background: rgba(0, 240, 255, 0.01);
            position: relative;
            box-sizing: border-box;
        }

        /* Lưới Mã Khóa 4x4 */
        .decoy-grid {
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            background: rgba(255, 0, 127, 0.02);
            border: 1px dashed #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.15);
            border-radius: 4px;
        }

        /* Lưới Dữ Liệu 3x9 */
        .grid-3x9 {
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            border: 1px solid #00f0ff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
            border-radius: 4px;
            transition: all 0.4s ease;
        }

        .grid-item {
            background: #040814;
            position: relative;
            border-radius: 3px;
            touch-action: none;
            box-sizing: border-box;
            height: 46px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 3px;
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.2s; 
        }

        .decoy-grid .grid-item { border: 1px solid #ff007f; box-shadow: inset 0 0 6px rgba(255, 0, 127, 0.1); }
        .grid-3x9 .grid-item { border: 1px solid #00f0ff; box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.15); }

        /* SỐ THỨ TỰ (STT) ĐÃ ĐƯỢC LÀM SÁNG */
        .cell-id {
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 0.5px;
            line-height: 1;
            margin-bottom: 2px;
            opacity: 1; 
            pointer-events: none;
            color: #ffd700; 
            text-shadow: 0 0 4px #ffd700, 0 0 8px rgba(255, 215, 0, 0.6); 
        }

        /* Chữ nội dung nằm chính giữa phía dưới STT */
        .grid-item textarea {
            width: 100%;
            height: 24px;
            background: transparent;
            border: none;
            color: #ffffff;
            text-shadow: 0 0 4px #ffffff;
            padding: 0 2px;
            box-sizing: border-box;
            resize: none;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            font-family: inherit;
            pointer-events: none;
            overflow: hidden;
            line-height: 24px;
        }

        /* HIỆU ỨNG ĐI CÙNG NHAU KHI KÉO THẢ */
        .grid-item.dragging {
            position: fixed !important;
            z-index: 9999 !important;
            opacity: 0.95;
            transform: scale(1.1) !important;
            border: 1px solid #ffffff !important;
            background: #091630 !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 25px rgba(0, 240, 255, 0.3) !important;
            transition: none !important;
        }

        /* Hiệu ứng dạt ô sang hai bên */
        .grid-item.shift-left { transform: translateX(-12px) scale(0.96); border-color: #ffd700 !important; }
        .grid-item.shift-right { transform: translateX(12px) scale(0.96); border-color: #ffd700 !important; }

        /* --- OUTPUT AREA --- */
        .output-container {
            position: relative;
            width: 100%;
            transition: all 0.4s ease;
        }

        .output-box {
            width: 100%;
            min-height: 90px;
            height: auto; 
            background: #030306;
            border: 1px solid #00f0ff;
            color: #00f0ff;
            text-shadow: 0 0 4px rgba(0, 240, 255, 0.6);
            padding: 8px;
            padding-top: 38px; 
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            resize: none;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
            letter-spacing: 0.5px;
            line-height: 1.6;
            overflow-y: hidden; 
        }

        .btn-copy {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #030306;
            border: 1px solid #00f0ff;
            color: #00f0ff;
            padding: 4px 12px;
            font-size: 10px;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            border-radius: 3px;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
            transition: all 0.1s ease;
            z-index: 20;
        }
        .btn-copy:active { background: #00f0ff; color: #020204; box-shadow: 0 0 10px #00f0ff; }
    </style>
</head>
<body>

<div class="container">
    <!-- KHÓA 4x4 -->
    <h3>
        <span>1. Crypto Controller (4x4)</span>
        <span id="lockStatus" class="status-badge status-locked">MATRIX SHUFFLING</span>
    </h3>
    <div class="grid-container decoy-grid" id="decoyGrid"></div>

    <!-- LƯỚI CHÍNH 3x9 -->
    <h3>2. Matrix Data (3x9)</h3>
    <div class="grid-container grid-3x9" id="mainGrid"></div>

    <!-- KẾT QUẢ -->
    <h3>3. Output Stream</h3>
    <div class="output-container" id="outputArea">
        <button class="btn-copy" id="btnCopy">Copy</button>
        <textarea id="textStreamLog" class="output-box" readonly placeholder="Đang tính toán chuỗi dữ liệu..."></textarea>
    </div>
</div>

<script>
    const decoyGrid = document.getElementById('decoyGrid');
    const mainGrid = document.getElementById('mainGrid');
    const outputArea = document.getElementById('outputArea');
    const textStreamLog = document.getElementById('textStreamLog');
    const btnCopy = document.getElementById('btnCopy');
    const lockStatus = document.getElementById('lockStatus');

    // Mảng dữ liệu ban đầu cho lưới 4x4 (gồm STT và Icon đi cùng nhau)
    let decoyData = [
        { id: "01", val: "👁" }, { id: "02", val: "🔮" }, { id: "03", val: "⚡" }, { id: "04", val: "☣" },
        { id: "05", val: "❖" }, { id: "06", val: "🔺" }, { id: "07", val: "⎔" }, { id: "08", val: "𝝮" },
        { id: "09", val: "⚙" }, { id: "10", val: "✦" }, { id: "11", val: "✕" }, { id: "12", val: "🌀" },
        { id: "13", val: "⛓" }, { id: "14", val: "⚝" }, { id: "15", val: "🔱" }, { id: "16", val: "💎" }
    ];
    
    // Chuỗi văn bản đích mặc định 3x9 bạn yêu cầu
    const DEFAULT_TARGET_WORDS = [
        "board", "whiskey", "awkward", "work", "pudding", "chimney", "coin", "broken", "old", 
        "safe", "nation", "victory", "link", "safe", "lounge", "victory", "aspect", "legal", 
        "pear", "recall", "rate", "arrow", "dust", "reason", "gloom", "custom", "yellow"
    ];

    // Cấu trúc dữ liệu lưới 3x9
    let mainData = [];
    DEFAULT_TARGET_WORDS.forEach((word, idx) => {
        mainData.push({
            id: String(idx + 1).padStart(2, '0'),
            val: word
        });
    });

    let cachedRects = [];
    let activeItem = null;
    let initialX = 0, initialY = 0;
    let targetInsertIndex = null;
    let pressTimer = null;
    let isLongPressed = false;
    let isCorrectSequence = false;

    // Thuật toán xáo trộn Fisher-Yates
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Hàm xáo trộn văn bản của lưới 3x9
    function shuffleMainValues() {
        let valuesOnly = mainData.map(item => item.val);
        shuffleArray(valuesOnly);
        mainData.forEach((item, idx) => {
            item.val = valuesOnly[idx];
        });
    }

    // Khôi phục lưới 3x9 về chuỗi gốc
    function resetMainValuesToDefault() {
        mainData.forEach((item, idx) => {
            item.val = DEFAULT_TARGET_WORDS[idx];
        });
    }

    function renderEngine(gridElement, dataArray, prefixStr) {
        gridElement.innerHTML = '';
        dataArray.forEach((itemData, idx) => {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.setAttribute('data-index', idx);
            item.setAttribute('data-grid', prefixStr);

            const label = document.createElement('span');
            label.className = 'cell-id';
            label.innerText = itemData.id; 

            const textarea = document.createElement('textarea');
            textarea.value = itemData.val;      

            item.appendChild(label);
            item.appendChild(textarea);
            
            setupTouchEngine(item, dataArray, prefixStr);
            gridElement.appendChild(item);
        });
    }

    // LOGIC THAY ĐỔI: Kiểm tra xem 3 ô mang STT "09", "06", "01" có nằm cạnh nhau không
    function checkSequenceStatus() {
        let matchFound = false;
        
        // Quét qua mảng 4x4 để tìm cụm liên tiếp 09 -> 06 -> 01
        for (let i = 0; i <= decoyData.length - 3; i++) {
            if (decoyData[i].id === "09" && decoyData[i+1].id === "06" && decoyData[i+2].id === "01") {
                matchFound = true;
                break;
            }
        }

        if (matchFound) {
            isCorrectSequence = true;
            lockStatus.innerText = "Mật khẩu khớp";
            lockStatus.className = "status-badge status-unlocked";
            resetMainValuesToDefault(); // Trả về chuỗi văn bản đích mặc định không xáo trộn
        } else {
            isCorrectSequence = false;
            lockStatus.innerText = "Random";
            lockStatus.className = "status-badge status-locked";
        }
    }

    function renderAll() {
        renderEngine(decoyGrid, decoyData, 'decoy');
        renderEngine(mainGrid, mainData, 'main');
        updateRealTimeLog();
    }

    function autoResizeOutput() {
        textStreamLog.style.height = 'auto';
        textStreamLog.style.height = (textStreamLog.scrollHeight) + 'px';
    }

    function cacheGridLayout(prefixStr) {
        cachedRects = [];
        const items = document.querySelectorAll(`.grid-item[data-grid="${prefixStr}"]:not(.dragging)`);
        items.forEach(item => {
            const rect = item.getBoundingClientRect();
            cachedRects.push({
                index: parseInt(item.getAttribute('data-index')),
                left: rect.left, right: rect.right, top: rect.top, bottom: rect.bottom,
                width: rect.width, height: rect.height,
                centerX: rect.left + rect.width / 2,
                centerY: rect.top + rect.height / 2,
                element: item
            });
        });
    }

    function setupTouchEngine(item, dataArray, prefixStr) {
        item.addEventListener('touchstart', function(e) {
            isLongPressed = false;
            const touch = e.touches[0];
            
            pressTimer = setTimeout(() => {
                isLongPressed = true;
                activeItem = item;
                
                cacheGridLayout(prefixStr);
                const rect = item.getBoundingClientRect();
                
                item.style.width = rect.width + 'px';
                item.style.height = rect.height + 'px';
                
                initialX = touch.clientX - rect.left;
                initialY = touch.clientY - rect.top;
                
                item.style.left = rect.left + 'px';
                item.style.top = rect.top + 'px';
                
                item.classList.add('dragging');
                targetInsertIndex = parseInt(item.getAttribute('data-index'));
            }, 350); 
        }, { passive: true });

        item.addEventListener('touchmove', function(e) {
            if (!isLongPressed) {
                clearTimeout(pressTimer);
                return;
            }
            
            if (e.cancelable) e.preventDefault();
            if (!activeItem) return;
            
            const touch = e.touches[0];
            const currentX = touch.clientX;
            const currentY = touch.clientY;
            
            activeItem.style.left = (currentX - initialX) + 'px';
            activeItem.style.top = (currentY - initialY) + 'px';
            
            let closestBox = null;
            let minDistance = 99999;
            
            cachedRects.forEach(box => {
                if (box.index === parseInt(activeItem.getAttribute('data-index'))) return;
                
                const dist = Math.hypot(currentX - box.centerX, currentY - box.centerY);
                if (dist < minDistance && dist < 80) { 
                    minDistance = dist;
                    closestBox = box;
                }
            });

            document.querySelectorAll(`.grid-item[data-grid="${prefixStr}"]`).forEach(el => {
                el.classList.remove('shift-left', 'shift-right');
            });

            if (closestBox) {
                targetInsertIndex = closestBox.index;
                const fromIndex = parseInt(activeItem.getAttribute('data-index'));

                cachedRects.forEach(box => {
                    if (box.index === fromIndex) return;
                    
                    if (box.index === targetInsertIndex) {
                        if (currentX < box.centerX) {
                            box.element.classList.add('shift-right');
                        } else {
                            box.element.classList.add('shift-left');
                        }
                    } else if (box.index > fromIndex && box.index <= targetInsertIndex) {
                        box.element.classList.add('shift-left');
                    } else if (box.index < fromIndex && box.index >= targetInsertIndex) {
                        box.element.classList.add('shift-right');
                    }
                });
            } else {
                targetInsertIndex = parseInt(activeItem.getAttribute('data-index'));
            }
        }, { passive: false });

        item.addEventListener('touchend', function(e) {
            clearTimeout(pressTimer);
            if (!isLongPressed || !activeItem) {
                activeItem = null;
                return;
            }
            
            document.querySelectorAll(`.grid-item[data-grid="${prefixStr}"]`).forEach(el => {
                el.classList.remove('shift-left', 'shift-right');
            });
            
            const fromIndex = parseInt(activeItem.getAttribute('data-index'));
            
            if (targetInsertIndex !== null && targetInsertIndex !== fromIndex) {
                const [movedData] = dataArray.splice(fromIndex, 1);
                dataArray.splice(targetInsertIndex, 0, movedData);
                
                // Mỗi khi kéo thả trên lưới 4x4, hệ thống kiểm tra tạm thời trước khi kích hoạt xáo trộn
                if (prefixStr === 'decoy') {
                    let tempMatch = false;
                    for (let i = 0; i <= decoyData.length - 3; i++) {
                        if (decoyData[i].id === "09" && decoyData[i+1].id === "06" && decoyData[i+2].id === "01") {
                            tempMatch = true;
                            break;
                        }
                    }
                    // Nếu sau khi kéo thả mà 3 ô 9-6-1 KHÔNG đặt cạnh nhau -> Tiếp tục xáo trộn 3x9
                    if (!tempMatch) {
                        shuffleMainValues();
                    }
                }
            }
            
            activeItem.classList.remove('dragging');
            activeItem.style.width = ''; activeItem.style.height = '';
            activeItem.style.left = ''; activeItem.style.top = '';
            
            activeItem = null;
            targetInsertIndex = null;
            isLongPressed = false;
            
            checkSequenceStatus();
            renderAll();
        });
    }

    function updateRealTimeLog() {
        let pureTextValues = mainData.map(item => {
            return item.val.trim() === "" ? "Ø" : item.val;
        });
        
        textStreamLog.value = pureTextValues.join(' ');
        autoResizeOutput(); 
    }

    btnCopy.addEventListener('click', () => {
        textStreamLog.select();
        textStreamLog.setSelectionRange(0, 99999);
        
        navigator.clipboard.writeText(textStreamLog.value).then(() => {
            const originalText = btnCopy.innerText;
            btnCopy.innerText = "Copied!";
            btnCopy.style.borderColor = "#ff007f";
            btnCopy.style.color = "#ff007f";
            setTimeout(() => {
                btnCopy.innerText = originalText;
                btnCopy.style.borderColor = "#00f0ff";
                btnCopy.style.color = "#00f0ff";
            }, 1000);
        }).catch(() => {
            alert("Không thể sao chép tự động.");
        });
    });

    // Lúc vừa mở trang: Xáo trộn ngẫu nhiên dữ liệu 3x9
    shuffleMainValues();
    checkSequenceStatus();
    renderAll();
</script>

</body>
</html>
